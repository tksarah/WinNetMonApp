      <stop offset="0" stop-color="#f4f1ec"/>
      <stop offset="1" stop-color="#e7e2da"/>
    </linearGradient>
  </defs>

  <!-- warm gray background (original) -->
  <rect x="64" y="64" width="896" height="896" rx="180" fill="url(#bg)"/>
